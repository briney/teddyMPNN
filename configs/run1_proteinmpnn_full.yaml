# Run 1: ProteinMPNN fine-tuning on full data mix (60/20/20 teddymer/nvidia/pdb)
#
# Base model: ProteinMPNN v_48_020 (48 neighbors, noise=0.20)
# Expected training time: ~48h on 4x A100

model:
  model_type: protein_mpnn
  hidden_dim: 128
  num_encoder_layers: 3
  num_decoder_layers: 3
  num_neighbors: 48
  dropout_rate: 0.1

pretrained_weights: weights/proteinmpnn_v_48_020.pt

data_sources:
  - name: teddymer
    weight: 0.60
    path: data/manifests/train_teddymer.tsv
    source_type: teddymer
  - name: nvidia
    weight: 0.20
    path: data/manifests/train_nvidia.tsv
    source_type: nvidia
  - name: pdb
    weight: 0.20
    path: data/manifests/train_pdb.tsv
    source_type: pdb

validation_data_sources:
  - name: teddymer
    weight: 0.60
    path: data/manifests/val_teddymer.tsv
    source_type: teddymer
  - name: nvidia
    weight: 0.20
    path: data/manifests/val_nvidia.tsv
    source_type: nvidia
  - name: pdb
    weight: 0.20
    path: data/manifests/val_pdb.tsv
    source_type: pdb

token_budget: 10000
max_residues: 6000
min_interface_contacts: 4
learning_rate_factor: 2.0
warmup_steps: 4000
max_steps: 300000
structure_noise: 0.20
label_smoothing: 0.1
mixed_precision: true
gradient_checkpointing: true
num_workers: 8
seed: 42

log_every_n_steps: 100
eval_every_n_steps: 5000
save_every_n_steps: 10000
output_dir: outputs/run1_proteinmpnn_full

wandb_project: teddympnn
