# Run 4: LigandMPNN ablation — no NVIDIA data (80/0/20 teddymer/pdb)
#
# Base model: LigandMPNN v_32_010_25 (32 neighbors, noise=0.10, 25 context atoms)
# Purpose: Measure contribution of NVIDIA predicted complexes

model:
  model_type: ligand_mpnn
  hidden_dim: 128
  num_encoder_layers: 3
  num_decoder_layers: 3
  num_neighbors: 32
  num_context_atoms: 25
  dropout_rate: 0.1

pretrained_weights: weights/v_32_010_25.pt

data_sources:
  - name: teddymer
    weight: 0.80
    path: data/manifests/train_manifest.tsv
    source_type: teddymer
  - name: pdb
    weight: 0.20
    path: data/manifests/train_manifest.tsv
    source_type: pdb

token_budget: 10000
max_residues: 6000
min_interface_contacts: 4
learning_rate_factor: 2.0
warmup_steps: 4000
max_steps: 300000
structure_noise: 0.10
label_smoothing: 0.1
mixed_precision: true
gradient_checkpointing: true
num_workers: 8
seed: 42

log_every_n_steps: 100
eval_every_n_steps: 5000
save_every_n_steps: 10000
output_dir: outputs/run4_ligandmpnn_ablation

wandb_project: teddympnn
